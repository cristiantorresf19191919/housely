<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ink-bloom studies — twenty</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─────────────────────────────────────────────
         Specimen sheet — type & paper
         ───────────────────────────────────────────── */
      :root {
        --paper:        #efece6;
        --paper-warm:   #f3efe7;
        --tile:         #fdfcf8;
        --ink:          #0a0908;
        --rule:         rgba(10, 9, 8, 0.16);
        --label:        rgba(10, 9, 8, 0.5);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      html { color-scheme: light; }

      body {
        background: var(--paper);
        background-image:
          radial-gradient(ellipse 80% 60% at 50% 0%,
            color-mix(in srgb, white 32%, transparent), transparent 60%),
          radial-gradient(ellipse 70% 50% at 50% 100%,
            color-mix(in srgb, var(--ink) 8%, transparent), transparent 60%);
        color: var(--ink);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 16px;
        min-height: 100vh;
        padding: 56px 24px 96px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow-x: hidden;
      }

      /* paper grain — fixed, behind everything */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.07;
        mix-blend-mode: multiply;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
      }

      /* very fine deckled vignette so the page feels like an actual sheet */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(ellipse 110% 90% at 50% 50%,
          transparent 60%, color-mix(in srgb, var(--ink) 10%, transparent) 100%);
      }

      header {
        position: relative;
        z-index: 1;
        text-align: center;
        margin: 0 0 64px;
        line-height: 1;
        max-width: 720px;
      }
      header .mark {
        display: inline-block;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-weight: 500;
        font-size: 10px;
        letter-spacing: 0.32em;
        color: var(--label);
        text-transform: uppercase;
      }
      header h1 {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(2.25rem, 4vw, 3.5rem);
        margin: 18px 0 0;
        letter-spacing: -0.012em;
        line-height: 1.05;
      }
      header h1 .amp {
        font-family: "Cormorant Garamond", serif;
        font-weight: 400;
        font-style: italic;
        opacity: 0.55;
        margin: 0 0.2ch;
      }
      header .rule {
        width: 38px;
        height: 1px;
        background: var(--ink);
        opacity: 0.32;
        margin: 28px auto 0;
      }

      .grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, 200px);
        column-gap: 32px;
        row-gap: 56px;
        justify-content: center;
        max-width: 1248px;
        width: 100%;
      }

      .cell {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .tile {
        position: relative;
        width: 200px;
        height: 200px;
        background: var(--tile);
        border-radius: 4px;
        overflow: hidden;
        isolation: isolate;
        box-shadow:
          0 0 0 0.5px rgba(10, 9, 8, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          0 12px 28px -16px rgba(10, 9, 8, 0.32),
          0 2px 6px -2px rgba(10, 9, 8, 0.10);
      }
      /* a faint paper texture inside each tile so the white doesn't read as plastic */
      .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        opacity: 0.04;
        mix-blend-mode: multiply;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      .label {
        margin-top: 16px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 9.5px;
        font-weight: 500;
        letter-spacing: 0.22em;
        color: var(--label);
        text-transform: uppercase;
      }

      footer {
        position: relative;
        z-index: 1;
        margin: 80px 0 0;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 9.5px;
        letter-spacing: 0.32em;
        color: var(--label);
        text-transform: uppercase;
      }

      /* ─────────────────────────────────────────────
         Ink layers
         Each .ink is a div painted with a 2-stop
         gradient (ink → transparent) whose stop position
         is animated, then deformed by an SVG turbulence
         filter to break the front into an organic edge.
         ───────────────────────────────────────────── */
      .ink, .ink-a, .ink-b, .ink-c {
        position: absolute;
        /* extend past the tile so heavy displacement isn't clipped */
        inset: -14%;
        background: transparent;
        will-change: background, transform;
      }

      /* @property declarations — required for keyframe-animating gradient stops */
      @property --r  { syntax: '<percentage>'; inherits: false; initial-value: 0%; }
      @property --rA { syntax: '<percentage>'; inherits: false; initial-value: 0%; }
      @property --rB { syntax: '<percentage>'; inherits: false; initial-value: 0%; }
      @property --rC { syntax: '<percentage>'; inherits: false; initial-value: 0%; }

      /* Shared keyframe vocab.
         All animations are infinite alternate — the reverse cycle plays the
         keyframes backwards, so light → dark → light always feels organic. */
      @keyframes bloom        { from { --r:   0%; } to { --r: 132%; } }
      @keyframes bloom-quick  {
        from { --r:   0%; }
        72%  { --r: 116%; }
        to   { --r: 132%; }
      }
      @keyframes bloom-slow   { from { --r:   0%; } to { --r: 130%; } }
      @keyframes bloom-pulse  {
        0%   { --r:   0%; }
        18%  { --r:  28%; }
        30%  { --r:  20%; }
        50%  { --r:  64%; }
        64%  { --r:  56%; }
        100% { --r: 130%; }
      }
      @keyframes bloom-inverse { from { --r: 0%; } to { --r: 132%; } }
      @keyframes drop-a {
        0%, 4%   { --rA:   0%; }
        38%      { --rA:  74%; }
        100%     { --rA:  74%; }
      }
      @keyframes drop-b {
        0%, 28%  { --rB:   0%; }
        62%      { --rB:  74%; }
        100%     { --rB:  74%; }
      }
      @keyframes drop-c {
        0%, 56%  { --rC:   0%; }
        90%      { --rC:  78%; }
        100%     { --rC:  78%; }
      }

      /* The two-stop pattern below intentionally lets the inner stop go
         negative when --r is small, which the browser normalizes to "no
         visible ink" — that's how each tile starts perfectly clean. */

      /* 01 · single drop · slow soak · smooth blob ─── */
      .t01 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 5%),
          transparent var(--r));
        filter: url(#f-soft-1);
        animation: bloom 5.6s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
      }
      /* 02 · single drop · quick splash ─────────────── */
      .t02 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 4%),
          transparent var(--r));
        filter: url(#f-soft-2);
        animation: bloom-quick 4.4s cubic-bezier(0.16, 0.84, 0.34, 1) infinite alternate;
      }
      /* 03 · two drops · diagonal merge ─────────────── */
      .t03 .ink {
        background:
          radial-gradient(circle at 28% 32%,
            var(--ink) calc(var(--r) - 6%), transparent var(--r)),
          radial-gradient(circle at 72% 68%,
            var(--ink) calc(var(--r) - 6%), transparent var(--r));
        filter: url(#f-soft-3);
        animation: bloom 5.4s ease-in-out infinite alternate;
      }
      /* 04 · two drops · vertical merge ─────────────── */
      .t04 .ink {
        background:
          radial-gradient(circle at 50% 22%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 50% 78%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r));
        filter: url(#f-soft-1);
        animation: bloom 5s ease-in-out infinite alternate;
      }
      /* 05 · three drops · triangle nuclei ──────────── */
      .t05 .ink {
        background:
          radial-gradient(circle at 50% 22%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 22% 72%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 78% 72%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r));
        filter: url(#f-soft-2);
        animation: bloom 5.6s ease-in-out infinite alternate;
      }
      /* 06 · five scattered nuclei ───────────────────── */
      .t06 .ink {
        background:
          radial-gradient(circle at 18% 28%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 50% 18%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 84% 32%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 30% 78%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 72% 80%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r));
        filter: url(#f-soft-3);
        animation: bloom 5.6s ease-in-out infinite alternate;
      }
      /* 07 · top edge bleed · capillary fingers down ── */
      .t07 .ink {
        background: linear-gradient(to bottom,
          var(--ink) calc(var(--r) - 8%),
          transparent var(--r));
        filter: url(#f-cap-vert-1);
        animation: bloom-slow 6s cubic-bezier(0.55, 0.06, 0.5, 0.95) infinite alternate;
      }
      /* 08 · bottom edge bleed · capillary fingers up ── */
      .t08 .ink {
        background: linear-gradient(to top,
          var(--ink) calc(var(--r) - 8%),
          transparent var(--r));
        filter: url(#f-cap-vert-2);
        animation: bloom-slow 5.8s cubic-bezier(0.55, 0.06, 0.5, 0.95) infinite alternate;
      }
      /* 09 · left edge bleed · capillary fingers right ─ */
      .t09 .ink {
        background: linear-gradient(to right,
          var(--ink) calc(var(--r) - 8%),
          transparent var(--r));
        filter: url(#f-cap-horiz-1);
        animation: bloom-slow 6.2s cubic-bezier(0.55, 0.06, 0.5, 0.95) infinite alternate;
      }
      /* 10 · right edge bleed · capillary fingers left ─ */
      .t10 .ink {
        background: linear-gradient(to left,
          var(--ink) calc(var(--r) - 8%),
          transparent var(--r));
        filter: url(#f-cap-horiz-2);
        animation: bloom-slow 6.4s cubic-bezier(0.55, 0.06, 0.5, 0.95) infinite alternate;
      }
      /* 11 · top-left corner soak ─────────────────────── */
      .t11 .ink {
        background: radial-gradient(circle at 6% 6%,
          var(--ink) calc(var(--r) - 5%),
          transparent var(--r));
        filter: url(#f-soft-2);
        animation: bloom 5.4s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
      }
      /* 12 · bottom-right corner soak ─────────────────── */
      .t12 .ink {
        background: radial-gradient(circle at 94% 94%,
          var(--ink) calc(var(--r) - 5%),
          transparent var(--r));
        filter: url(#f-soft-3);
        animation: bloom 5.4s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
      }
      /* 13 · pulsing bloom · centre · 3 surges ────────── */
      .t13 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 5%),
          transparent var(--r));
        filter: url(#f-soft-1);
        animation: bloom-pulse 6.4s ease-in-out infinite alternate;
      }
      /* 14 · capillary fingers · radial reach outward ── */
      .t14 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 4%),
          transparent var(--r));
        filter: url(#f-cap-radial);
        animation: bloom 5.4s ease-in-out infinite alternate;
      }
      /* 15 · fibrous bleed ────────────────────────────── */
      .t15 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 4%),
          transparent var(--r));
        filter: url(#f-fiber-1);
        animation: bloom-slow 6.4s ease-in-out infinite alternate;
      }
      /* 16 · dithered grain edge ──────────────────────── */
      .t16 .ink {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--r) - 3%),
          transparent var(--r));
        filter: url(#f-dither);
        animation: bloom 5s ease-in-out infinite alternate;
      }
      /* 17 · droplet trail · diagonal sequence ────────── */
      .t17 .ink-a {
        background: radial-gradient(circle at 22% 26%,
          var(--ink) calc(var(--rA) - 6%),
          transparent var(--rA));
        filter: url(#f-soft-3);
        animation: drop-a 6s ease-in-out infinite alternate;
      }
      .t17 .ink-b {
        background: radial-gradient(circle at 50% 50%,
          var(--ink) calc(var(--rB) - 6%),
          transparent var(--rB));
        filter: url(#f-soft-2);
        animation: drop-b 6s ease-in-out infinite alternate;
      }
      .t17 .ink-c {
        background: radial-gradient(circle at 78% 74%,
          var(--ink) calc(var(--rC) - 6%),
          transparent var(--rC));
        filter: url(#f-soft-1);
        animation: drop-c 6s ease-in-out infinite alternate;
      }
      /* 18 · watercolour bloom · multi-layer concentric ─ */
      .t18 .ink {
        background:
          radial-gradient(circle at 46% 48%,
            var(--ink) calc(var(--r) - 9%), transparent var(--r)),
          radial-gradient(circle at 54% 52%,
            var(--ink) calc(var(--r) - 6%), transparent var(--r)),
          radial-gradient(circle at 50% 50%,
            var(--ink) calc(var(--r) - 14%), transparent var(--r));
        filter: url(#f-soak);
        animation: bloom-slow 6.4s ease-in-out infinite alternate;
      }
      /* 19 · constellation · eight syncing nuclei ─────── */
      .t19 .ink {
        background:
          radial-gradient(circle at 22% 26%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 50% 18%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 78% 28%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 86% 56%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 72% 84%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 36% 86%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 14% 64%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r)),
          radial-gradient(circle at 50% 52%,
            var(--ink) calc(var(--r) - 5%), transparent var(--r));
        filter: url(#f-soft-2);
        animation: bloom 5.4s ease-in-out infinite alternate;
      }
      /* 20 · inverse soak · dark closes from edges in ── */
      .t20 .ink {
        background: radial-gradient(circle at 50% 50%,
          transparent calc(110% - var(--r)),
          var(--ink) calc(115% - var(--r)));
        filter: url(#f-soft-3);
        animation: bloom-inverse 5.6s ease-in-out infinite alternate;
      }

      /* Reduced motion — freeze each specimen at a partial bloom so the
         page reads as a static catalogue of edges, not a flicker reel.
         Per-tile values are tuned so every variation reveals its character. */
      @media (prefers-reduced-motion: reduce) {
        .ink, .ink-a, .ink-b, .ink-c {
          animation: none !important;
        }
        /* single drop, centre */
        .t01 .ink, .t02 .ink, .t13 .ink, .t14 .ink, .t15 .ink, .t16 .ink, .t18 .ink { --r: 50%; }
        /* two drops merging */
        .t03 .ink, .t04 .ink { --r: 38%; }
        /* three drops */
        .t05 .ink { --r: 34%; }
        /* five nuclei */
        .t06 .ink { --r: 30%; }
        /* edge bleeds — half-fill is the most legible state */
        .t07 .ink, .t08 .ink, .t09 .ink, .t10 .ink { --r: 52%; }
        /* corner soaks — the ink has to travel diagonally to read */
        .t11 .ink, .t12 .ink { --r: 78%; }
        /* droplet trail — mid-sequence (A landed, B mid-bloom, C still arriving) */
        .t17 .ink-a { --rA: 70%; }
        .t17 .ink-b { --rB: 38%; }
        .t17 .ink-c { --rC:  0%; }
        /* constellation — eight smaller drops */
        .t19 .ink { --r: 22%; }
        /* inverse soak — keep the white aperture visible */
        .t20 .ink { --r: 60%; }
      }
    </style>
  </head>
  <body>
    <!-- Filter library — distinct turbulence + displacement recipes -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <!-- smooth blob -->
        <filter id="f-soft-1" x="-18%" y="-18%" width="136%" height="136%">
          <feTurbulence type="fractalNoise" baseFrequency="0.024" numOctaves="2" seed="3"/>
          <feDisplacementMap in="SourceGraphic" scale="14"/>
        </filter>
        <filter id="f-soft-2" x="-18%" y="-18%" width="136%" height="136%">
          <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="11"/>
          <feDisplacementMap in="SourceGraphic" scale="16"/>
        </filter>
        <filter id="f-soft-3" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.020" numOctaves="3" seed="7"/>
          <feDisplacementMap in="SourceGraphic" scale="18"/>
        </filter>

        <!-- fibrous bleed (very low frequency, high octaves, large displacement) -->
        <filter id="f-fiber-1" x="-25%" y="-25%" width="150%" height="150%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="5"/>
          <feDisplacementMap in="SourceGraphic" scale="26"/>
        </filter>

        <!-- radial capillary reach (long fingers around the bloom front) -->
        <filter id="f-cap-radial" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="21"/>
          <feDisplacementMap in="SourceGraphic" scale="32"/>
        </filter>

        <!-- vertical fingers — high X-freq, low Y-freq → vertical streaks -->
        <filter id="f-cap-vert-1" x="-15%" y="-25%" width="130%" height="150%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05 0.014" numOctaves="3" seed="2"/>
          <feDisplacementMap in="SourceGraphic" scale="22"/>
        </filter>
        <filter id="f-cap-vert-2" x="-15%" y="-25%" width="130%" height="150%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05 0.014" numOctaves="3" seed="13"/>
          <feDisplacementMap in="SourceGraphic" scale="24"/>
        </filter>

        <!-- horizontal fingers — low X-freq, high Y-freq → horizontal streaks -->
        <filter id="f-cap-horiz-1" x="-25%" y="-15%" width="150%" height="130%">
          <feTurbulence type="fractalNoise" baseFrequency="0.014 0.05" numOctaves="3" seed="6"/>
          <feDisplacementMap in="SourceGraphic" scale="22"/>
        </filter>
        <filter id="f-cap-horiz-2" x="-25%" y="-15%" width="150%" height="130%">
          <feTurbulence type="fractalNoise" baseFrequency="0.014 0.05" numOctaves="3" seed="19"/>
          <feDisplacementMap in="SourceGraphic" scale="24"/>
        </filter>

        <!-- dithered grain edge — high freq + small displacement breaks the
             front into a stippled, halftone-like edge -->
        <filter id="f-dither" x="-15%" y="-15%" width="130%" height="130%">
          <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="2" seed="9"/>
          <feDisplacementMap in="SourceGraphic" scale="6"/>
        </filter>

        <!-- watercolour soak — softer, slower, larger lobes -->
        <filter id="f-soak" x="-25%" y="-25%" width="150%" height="150%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="17"/>
          <feDisplacementMap in="SourceGraphic" scale="22"/>
        </filter>
      </defs>
    </svg>

    <header>
      <span class="mark">Ink-bloom studies · Twenty</span>
      <h1>variations <span class="amp">on</span> a wet edge</h1>
      <div class="rule"></div>
    </header>

    <main class="grid">
      <div class="cell"><div class="tile t01"><div class="ink"></div></div><span class="label">№ 01</span></div>
      <div class="cell"><div class="tile t02"><div class="ink"></div></div><span class="label">№ 02</span></div>
      <div class="cell"><div class="tile t03"><div class="ink"></div></div><span class="label">№ 03</span></div>
      <div class="cell"><div class="tile t04"><div class="ink"></div></div><span class="label">№ 04</span></div>
      <div class="cell"><div class="tile t05"><div class="ink"></div></div><span class="label">№ 05</span></div>
      <div class="cell"><div class="tile t06"><div class="ink"></div></div><span class="label">№ 06</span></div>
      <div class="cell"><div class="tile t07"><div class="ink"></div></div><span class="label">№ 07</span></div>
      <div class="cell"><div class="tile t08"><div class="ink"></div></div><span class="label">№ 08</span></div>
      <div class="cell"><div class="tile t09"><div class="ink"></div></div><span class="label">№ 09</span></div>
      <div class="cell"><div class="tile t10"><div class="ink"></div></div><span class="label">№ 10</span></div>
      <div class="cell"><div class="tile t11"><div class="ink"></div></div><span class="label">№ 11</span></div>
      <div class="cell"><div class="tile t12"><div class="ink"></div></div><span class="label">№ 12</span></div>
      <div class="cell"><div class="tile t13"><div class="ink"></div></div><span class="label">№ 13</span></div>
      <div class="cell"><div class="tile t14"><div class="ink"></div></div><span class="label">№ 14</span></div>
      <div class="cell"><div class="tile t15"><div class="ink"></div></div><span class="label">№ 15</span></div>
      <div class="cell"><div class="tile t16"><div class="ink"></div></div><span class="label">№ 16</span></div>
